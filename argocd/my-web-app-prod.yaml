apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-web-app-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yzimm/yaki-devops-lab
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
