apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-web-app-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yzimm/yaki-devops-lab
    targetRevision: dev
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
