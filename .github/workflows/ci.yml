
name: CI - Build and Push

on:
  push:
    branches:
      - main
      - staging
      - dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install kustomize
        run: |
          curl -sLo kustomize.tar.gz https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.3.0/kustomize_v5.3.0_linux_amd64.tar.gz
          tar -xzf kustomize.tar.gz
          sudo mv kustomize /usr/local/bin/
          kustomize version

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tag based on branch
        id: vars
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "TAG=prod" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" == "staging" ]; then
            echo "TAG=staging" >> $GITHUB_OUTPUT
          else
            echo "TAG=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: yaki2026/my-web-app:${{ steps.vars.outputs.TAG }}

      - name: Update image in kustomization
        run: |
          cd k8s/overlays/${{ steps.vars.outputs.TAG }}
          kustomize edit set image my-web-app=yaki2026/my-web-app:${{ steps.vars.outputs.TAG }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/overlays/${{ steps.vars.outputs.TAG }}/kustomization.yaml
          git commit -m "Update image to ${{ steps.vars.outputs.TAG }}" || echo "No changes to commit"
          git push

